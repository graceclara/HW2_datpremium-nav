services:
  - type: web
    name: dat-premium-nav
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ALPHAVANTAGE_API_KEY
        sync: false
      - key: DEFAULT_DAYS
        value: "365"
      - key: MSTR_SHARES_OUTSTANDING
        value: "17500000"
